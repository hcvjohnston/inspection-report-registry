services:
  - type: web
    name: inspection-report-registry
    runtime: node
    plan: starter  # persistent disk requires a paid instance; free tier loses uploads on redeploy
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ADMIN_TOKEN
        generateValue: true  # protects /api/admin/leads exports; view/rotate in Render dashboard
    disk:
      name: registry-data
      mountPath: /data
      sizeGB: 1
